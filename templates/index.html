<!DOCTYPE html>
<html>
<head>
<title>SmartDesk AI Helpdesk</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:50px;
}

.container{
background:white;
width:600px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

textarea{
width:90%;
height:100px;
padding:10px;
}

button{
padding:10px 20px;
background:blue;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:15px;
background:#eee;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container">

<h1>SmartDesk AI Helpdesk System</h1>

<form action="/predict" method="post">

<textarea
name="ticket"
placeholder="Describe your issue">
</textarea>

<br><br>

<button type="submit">
Submit Ticket
</button>

</form>

{% if category %}

<div class="result">

<h2>
Category:
{{category}}
</h2>

<h3>
Priority:
{{priority}}
</h3>

<h3>
Solution:
{{solution}}
</h3>

</div>

{% endif %}

</div>

</body>
</html>
