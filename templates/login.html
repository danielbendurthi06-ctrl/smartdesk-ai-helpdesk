<!DOCTYPE html>
<html>

<head>

<title>SmartDesk Login</title>

<style>

body{
margin:0;
padding:0;
font-family:'Segoe UI',sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
135deg,
#0f2027,
#203a43,
#2c5364
);
overflow:hidden;
}

.container{
width:400px;
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
box-shadow:0 8px 32px rgba(0,0,0,0.3);
text-align:center;
color:white;
animation:fadeIn 1s ease;
}

h1{
margin-bottom:30px;
font-size:34px;
}

input{
width:100%;
padding:14px;
margin:12px 0;
border:none;
border-radius:12px;
outline:none;
font-size:16px;
background:rgba(255,255,255,0.15);
color:white;
}

input::placeholder{
color:#ddd;
}

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:12px;
background:#00bcd4;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0097a7;
transform:scale(1.03);
}

a{
color:#00e5ff;
text-decoration:none;
font-weight:bold;
}

p{
margin-top:20px;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="container">

<h1>SmartDesk Login</h1>

<form method="POST">

<input
type="email"
name="email"
placeholder="Enter Email"
required>

<input
type="password"
name="password"
placeholder="Enter Password"
required>

<button type="submit">
Login
</button>

</form>

<p>
Don't have account?
<a href="/register">
Register
</a>
</p>

</div>

</body>
</html>
